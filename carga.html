<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR.IANKA · Analizando</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f6fafd 0%, #e8f0f8 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 3rem;
      padding: 2.5rem 2rem 2.2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 40, 80, 0.25),
                  0 8px 24px -6px rgba(0, 20, 40, 0.08);
      text-align: center;
      transition: transform 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .card:hover {
      transform: translateY(-4px);
    }

    /* ----- LOGO con corazón ----- */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #e8435e;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px -6px rgba(232, 67, 94, 0.35);
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: #fff;
      stroke: none;
    }

    .logo-text {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1a2b4a 0%, #2a7de1 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ----- Títulos ----- */
    .title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #0b1a33;
      margin-bottom: 0.6rem;
      letter-spacing: -0.02em;
    }

    .sub {
      font-size: 1.1rem;
      color: #1f3a5e;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .desc {
      font-size: 0.95rem;
      color: #4a5f7a;
      margin-bottom: 2rem;
    }

    /* ----- Puntos de progreso (4 círculos) ----- */
    .progress-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin: 0.5rem 0;
    }

    .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #dce4ed;
      transition: background 0.3s ease;
      /* Animación de carga: se iluminan secuencialmente */
      animation: pulse 1.8s infinite ease-in-out;
    }

    .dot:nth-child(1) {
      animation-delay: 0s;
    }
    .dot:nth-child(2) {
      animation-delay: 0.45s;
    }
    .dot:nth-child(3) {
      animation-delay: 0.9s;
    }
    .dot:nth-child(4) {
      animation-delay: 1.35s;
    }

    @keyframes pulse {
      0%, 100% {
        background: #dce4ed;
        transform: scale(1);
      }
      50% {
        background: #2a7de1;
        transform: scale(1.15);
        box-shadow: 0 0 10px rgba(42, 125, 225, 0.4);
      }
    }

    /* Versión alternativa: si se prefiere que se vayan llenando, se puede usar, pero dejamos la animación de pulsos */

    /* ----- Responsive ----- */
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.2rem 1.8rem;
        border-radius: 2rem;
      }

      .title {
        font-size: 1.8rem;
      }

      .sub {
        font-size: 1rem;
      }

      .desc {
        font-size: 0.9rem;
      }

      .logo-text {
        font-size: 1.4rem;
      }

      .logo-icon {
        width: 42px;
        height: 42px;
      }

      .logo-icon svg {
        width: 24px;
        height: 24px;
      }

      .dot {
        width: 15px;
        height: 15px;
      }
    }

    @media (max-width: 380px) {
      .title {
        font-size: 1.5rem;
      }
      .dot {
        width: 13px;
        height: 13px;
      }
    }
  </style>
</head>
<body>

  <main class="card" role="main" aria-label="Pantalla de análisis de síntomas">

    <!-- LOGO con corazón -->
    <div class="logo" aria-label="Logo DR.IANKA">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
      </div>
      <span class="logo-text">DR.IANKA</span>
    </div>

    <!-- Título principal -->
    <h1 class="title">Analizando</h1>

    <!-- Subtítulo -->
    <p class="sub">Analizando tus síntomas...</p>

    <!-- Descripción -->
    <p class="desc">Esto puede tardar unos segundos.</p>

    <!-- Cuatro círculos de progreso animados -->
    <div class="progress-dots" aria-label="Progreso de análisis">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

  </main>

  <script>
    setTimeout(() => {
      window.location.href = 'diagnostico.html';
    }, 2000);
  </script>

</body>
</html>
