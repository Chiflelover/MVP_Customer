<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR.IANKA · Teleconsulta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  
  <!-- CSS Separados -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/teleconsulta.css" />
</head>
<body>

  <main class="card" role="main" aria-label="Selección de horario para teleconsulta">

    <!-- LOGO con corazón -->
    <div class="logo" aria-label="Logo DR.IANKA">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
      </div>
      <span class="logo-text">DR.IANKA</span>
    </div>

    <!-- Título -->
    <h1 class="title">Consulta</h1>

    <!-- Subtítulo -->
    <p class="sub">Selecciona un horario</p>

    <!-- Horarios (radio buttons estilizados) -->
    <div class="horarios" role="radiogroup" aria-label="Horarios disponibles">
      <label class="horario-item">
        <input type="radio" name="horario" value="09:00" />
        09:00
      </label>
      <label class="horario-item">
        <input type="radio" name="horario" value="10:30" />
        10:30
      </label>
      <label class="horario-item">
        <input type="radio" name="horario" value="13:00" />
        13:00
      </label>
      <label class="horario-item">
        <input type="radio" name="horario" value="16:00" />
        16:00
      </label>
    </div>

    <!-- Botón Confirmar -->
    <button class="btn-primary" type="button" onclick="window.location.href='confirmacion.html'">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12" />
      </svg>
      Confirmar
    </button>

  </main>

  <!-- JS Separado -->
  <script src="js/teleconsulta.js"></script>

</body>
</html>
