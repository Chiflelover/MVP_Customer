<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR.IANKA · Teleconsulta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f6fafd 0%, #e8f0f8 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 3rem;
      padding: 2.5rem 2rem 2.2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 40, 80, 0.25),
                  0 8px 24px -6px rgba(0, 20, 40, 0.08);
      text-align: center;
      transition: transform 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .card:hover {
      transform: translateY(-4px);
    }

    /* ----- LOGO con corazón ----- */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #e8435e;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px -6px rgba(232, 67, 94, 0.35);
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: #fff;
      stroke: none;
    }

    .logo-text {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1a2b4a 0%, #2a7de1 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ----- Títulos ----- */
    .title {
      font-size: 2rem;
      font-weight: 700;
      color: #0b1a33;
      margin-bottom: 0.4rem;
      letter-spacing: -0.02em;
    }

    .sub {
      font-size: 1.1rem;
      color: #4a5f7a;
      margin-bottom: 2rem;
      font-weight: 450;
    }

    /* ----- Lista de horarios (botones tipo chip) ----- */
    .horarios {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 2.2rem;
    }

    .horario-item {
      flex: 0 0 auto;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      border: 1.5px solid #dce4ed;
      background: rgba(255, 255, 255, 0.6);
      font-size: 1rem;
      font-weight: 500;
      color: #1a2b4a;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
      backdrop-filter: blur(2px);
      min-width: 80px;
    }

    .horario-item:hover {
      border-color: #2a7de1;
      background: rgba(42, 125, 225, 0.05);
      transform: scale(1.02);
    }

    .horario-item.active {
      border-color: #2a7de1;
      background: #2a7de1;
      color: #fff;
      box-shadow: 0 6px 16px -4px rgba(42, 125, 225, 0.35);
    }

    .horario-item input[type="radio"] {
      display: none;
    }

    /* ----- Botón Confirmar ----- */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #2a7de1;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.9rem 2.8rem;
      border-radius: 60px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px -6px rgba(42, 125, 225, 0.4);
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
      letter-spacing: 0.01em;
      text-decoration: none;
    }

    .btn-primary:hover {
      background: #1f6bcb;
      transform: scale(1.02);
      box-shadow: 0 12px 28px -8px rgba(42, 125, 225, 0.5);
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-primary svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ----- Responsive ----- */
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.2rem 1.8rem;
        border-radius: 2rem;
      }

      .title {
        font-size: 1.7rem;
      }

      .sub {
        font-size: 1rem;
      }

      .horario-item {
        padding: 0.6rem 1.4rem;
        font-size: 0.95rem;
        min-width: 70px;
      }

      .btn-primary {
        font-size: 1rem;
        padding: 0.8rem 1.8rem;
        max-width: 100%;
      }

      .logo-text {
        font-size: 1.4rem;
      }

      .logo-icon {
        width: 42px;
        height: 42px;
      }

      .logo-icon svg {
        width: 24px;
        height: 24px;
      }
    }

    @media (max-width: 380px) {
      .title {
        font-size: 1.4rem;
      }
      .horario-item {
        font-size: 0.85rem;
        padding: 0.5rem 1.2rem;
        min-width: 60px;
      }
    }
  </style>
</head>
<body>

  <main class="card" role="main" aria-label="Selección de horario para teleconsulta">

    <!-- LOGO con corazón -->
    <div class="logo" aria-label="Logo DR.IANKA">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
      </div>
      <span class="logo-text">DR.IANKA</span>
    </div>

    <!-- Título -->
    <h1 class="title">Consulta</h1>

    <!-- Subtítulo -->
    <p class="sub">Selecciona un horario</p>

    <!-- Horarios (radio buttons estilizados) -->
    <div class="horarios" role="radiogroup" aria-label="Horarios disponibles">
      <label class="horario-item">
        <input type="radio" name="horario" value="09:00" />
        09:00
      </label>
      <label class="horario-item">
        <input type="radio" name="horario" value="10:30" />
        10:30
      </label>
      <label class="horario-item">
        <input type="radio" name="horario" value="13:00" />
        13:00
      </label>
      <label class="horario-item">
        <input type="radio" name="horario" value="16:00" />
        16:00
      </label>
    </div>

    <!-- Botón Confirmar -->
    <button class="btn-primary" type="button" onclick="window.location.href='confirmacion.html'">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12" />
      </svg>
      Confirmar
    </button>

  </main>

  <!-- Script para manejar la selección visual (activo) -->
  <script>
    (function() {
      const items = document.querySelectorAll('.horario-item');
      const radios = document.querySelectorAll('input[name="horario"]');

      function updateActive() {
        items.forEach((item, index) => {
          const radio = radios[index];
          if (radio.checked) {
            item.classList.add('active');
          } else {
            item.classList.remove('active');
          }
        });
      }

      radios.forEach(radio => {
        radio.addEventListener('change', updateActive);
      });

      // Por si se hace clic en el label, sincronizar
      items.forEach((item, index) => {
        item.addEventListener('click', function(e) {
          const radio = radios[index];
          if (!radio.checked) {
            radio.checked = true;
            updateActive();
          }
        });
      });

      // Inicializar: marcar el primero por defecto si ninguno está seleccionado
      const anyChecked = Array.from(radios).some(r => r.checked);
      if (!anyChecked && radios.length > 0) {
        radios[0].checked = true;
        updateActive();
      }
    })();
  </script>

</body>
</html>
