<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR.IANKA · Confirmación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f6fafd 0%, #e8f0f8 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 3rem;
      padding: 2.5rem 2rem 2.2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 40, 80, 0.25),
                  0 8px 24px -6px rgba(0, 20, 40, 0.08);
      text-align: center;
      transition: transform 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .card:hover {
      transform: translateY(-4px);
    }

    /* ----- LOGO con corazón ----- */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #e8435e;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px -6px rgba(232, 67, 94, 0.35);
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: #fff;
      stroke: none;
    }

    .logo-text {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1a2b4a 0%, #2a7de1 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ----- Ícono de éxito (check grande) ----- */
    .success-icon {
      width: 80px;
      height: 80px;
      background: rgba(42, 125, 225, 0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
      border: 2px solid rgba(42, 125, 225, 0.15);
    }

    .success-icon svg {
      width: 44px;
      height: 44px;
      fill: none;
      stroke: #2a7de1;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ----- Títulos ----- */
    .title {
      font-size: 2rem;
      font-weight: 700;
      color: #0b1a33;
      margin-bottom: 0.6rem;
      letter-spacing: -0.02em;
    }

    .message {
      font-size: 1.1rem;
      color: #1a2b4a;
      font-weight: 500;
      margin-bottom: 0.3rem;
    }

    .sub-message {
      font-size: 0.95rem;
      color: #4a5f7a;
      margin-bottom: 2.2rem;
    }

    /* ----- Botón Volver al inicio ----- */
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: transparent;
      color: #1a2b4a;
      font-size: 1.1rem;
      font-weight: 500;
      padding: 0.8rem 2.4rem;
      border-radius: 60px;
      border: 1.5px solid #dce4ed;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(2px);
    }

    .btn-secondary:hover {
      border-color: #2a7de1;
      background: rgba(42, 125, 225, 0.05);
      transform: scale(1.02);
      box-shadow: 0 4px 12px -4px rgba(42, 125, 225, 0.15);
    }

    .btn-secondary:active {
      transform: scale(0.97);
    }

    .btn-secondary svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ----- Responsive ----- */
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.2rem 1.8rem;
        border-radius: 2rem;
      }

      .title {
        font-size: 1.7rem;
      }

      .message {
        font-size: 1rem;
      }

      .sub-message {
        font-size: 0.9rem;
      }

      .btn-secondary {
        font-size: 1rem;
        padding: 0.7rem 1.8rem;
        max-width: 100%;
      }

      .logo-text {
        font-size: 1.4rem;
      }

      .logo-icon {
        width: 42px;
        height: 42px;
      }

      .logo-icon svg {
        width: 24px;
        height: 24px;
      }

      .success-icon {
        width: 64px;
        height: 64px;
      }

      .success-icon svg {
        width: 36px;
        height: 36px;
      }
    }

    @media (max-width: 380px) {
      .title {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <main class="card" role="main" aria-label="Confirmación de cita médica">

    <!-- LOGO con corazón -->
    <div class="logo" aria-label="Logo DR.IANKA">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
      </div>
      <span class="logo-text">DR.IANKA</span>
    </div>

    <!-- Ícono de confirmación -->
    <div class="success-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12" />
        <circle cx="12" cy="12" r="10" />
      </svg>
    </div>

    <!-- Título -->
    <h1 class="title">Confirmación</h1>

    <!-- Mensaje principal -->
    <p class="message">Tu cita ha sido registrada.</p>

    <!-- Mensaje secundario -->
    <p class="sub-message">Recibirás un correo con la confirmacion.</p>

    <!-- Botón Volver al inicio -->
    <a href="index.html" class="btn-secondary" role="button">
      <svg viewBox="0 0 24 24">
        <path d="M3 12h18M3 12l4-4M3 12l4 4" />
      </svg>
      Volver al inicio
    </a>

  </main>

</body>
</html>
