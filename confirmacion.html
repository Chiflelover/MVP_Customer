<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR.IANKA · Confirmación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  
  <!-- CSS Separados -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/confirmacion.css" />
</head>
<body>

  <main class="card" role="main" aria-label="Confirmación de cita médica">

    <!-- LOGO con corazón -->
    <div class="logo" aria-label="Logo DR.IANKA">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
      </div>
      <span class="logo-text">DR.IANKA</span>
    </div>

    <!-- Ícono de confirmación -->
    <div class="success-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12" />
        <circle cx="12" cy="12" r="10" />
      </svg>
    </div>

    <!-- Título -->
    <h1 class="title">Confirmación</h1>

    <!-- Mensaje principal -->
    <p class="message">Tu cita ha sido registrada.</p>

    <!-- Mensaje secundario -->
    <p class="sub-message">Recibirás un correo con la confirmacion.</p>

    <!-- Botón Volver al inicio -->
    <a href="index.html" class="btn-secondary" role="button">
      <svg viewBox="0 0 24 24">
        <path d="M3 12h18M3 12l4-4M3 12l4 4" />
      </svg>
      Volver al inicio
    </a>

  </main>

</body>
</html>
