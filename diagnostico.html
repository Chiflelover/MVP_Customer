<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR.IANKA · Resultado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #f6fafd 0%, #e8f0f8 100%);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 3rem;
      padding: 2.5rem 2rem 2.2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 40, 80, 0.25),
                  0 8px 24px -6px rgba(0, 20, 40, 0.08);
      text-align: center;
      transition: transform 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .card:hover {
      transform: translateY(-4px);
    }

    /* ----- LOGO con corazón ----- */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 1.8rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #e8435e;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px -6px rgba(232, 67, 94, 0.35);
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: #fff;
      stroke: none;
    }

    .logo-text {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #1a2b4a 0%, #2a7de1 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ----- Títulos ----- */
    .title {
      font-size: 2rem;
      font-weight: 700;
      color: #0b1a33;
      margin-bottom: 0.6rem;
      letter-spacing: -0.02em;
    }

    .result-badge {
      display: inline-block;
      background: rgba(42, 125, 225, 0.08);
      padding: 0.3rem 1.5rem;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 500;
      color: #1a2b4a;
      margin-bottom: 0.5rem;
      border: 1px solid rgba(42, 125, 225, 0.08);
    }

    .message {
      font-size: 1.2rem;
      font-weight: 500;
      color: #0b1a33;
      margin: 0.8rem 0 1.8rem;
    }

    .recomendaciones {
      text-align: left;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(0, 0, 0, 0.03);
    }

    .recomendaciones p {
      font-weight: 500;
      color: #1a2b4a;
      margin-bottom: 0.8rem;
      font-size: 1rem;
    }

    .recomendacion-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1rem;
      color: #1f3a5e;
      padding: 0.25rem 0;
    }

    .recomendacion-item svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #2a7de1;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .divider {
      border: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, #dce4ed, transparent);
      margin: 1.5rem 0 1.8rem;
    }

    /* ----- Botón principal ----- */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #2a7de1;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.9rem 2.8rem;
      border-radius: 60px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px -6px rgba(42, 125, 225, 0.4);
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      letter-spacing: 0.01em;
      text-decoration: none;
    }

    .btn-primary:hover {
      background: #1f6bcb;
      transform: scale(1.02);
      box-shadow: 0 12px 28px -8px rgba(42, 125, 225, 0.5);
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-primary svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ----- Botón secundario ----- */
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: transparent;
      color: #1a2b4a;
      font-size: 1.1rem;
      font-weight: 500;
      padding: 0.8rem 2.4rem;
      border-radius: 60px;
      border: 1.5px solid #dce4ed;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      max-width: 320px;
      margin: 0.8rem auto 0;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(2px);
    }

    .btn-secondary:hover {
      border-color: #2a7de1;
      background: rgba(42, 125, 225, 0.05);
      transform: scale(1.02);
      box-shadow: 0 4px 12px -4px rgba(42, 125, 225, 0.15);
    }

    .btn-secondary:active {
      transform: scale(0.97);
    }

    .btn-secondary svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ----- Responsive ----- */
    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.2rem 1.8rem;
        border-radius: 2rem;
      }

      .title {
        font-size: 1.7rem;
      }

      .result-badge {
        font-size: 1rem;
        padding: 0.25rem 1.2rem;
      }

      .message {
        font-size: 1.1rem;
      }

      .recomendaciones {
        padding: 1rem 1.2rem;
      }

      .btn-primary {
        font-size: 1rem;
        padding: 0.8rem 1.8rem;
        max-width: 100%;
      }

      .logo-text {
        font-size: 1.4rem;
      }

      .logo-icon {
        width: 42px;
        height: 42px;
      }

      .logo-icon svg {
        width: 24px;
        height: 24px;
      }
    }

    @media (max-width: 380px) {
      .title {
        font-size: 1.4rem;
      }
      .recomendacion-item {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <main class="card" role="main" aria-label="Resultado de la evaluación médica">

    <!-- LOGO con corazón -->
    <div class="logo" aria-label="Logo DR.IANKA">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
      </div>
      <span class="logo-text">DR.IANKA</span>
    </div>

    <!-- Título -->
    <h1 class="title">Resultado</h1>

    <!-- Etiqueta de resultado -->
    <div class="result-badge" id="resultBadge">Resultado</div>

    <!-- Mensaje principal -->
    <p class="message" id="resultMessage">No parece una emergencia.</p>

    <!-- Recomendaciones -->
    <div class="recomendaciones" id="recommendationsContainer">
      <p>Te recomendamos</p>
      <!-- Se llenará dinámicamente -->
    </div>

    <!-- Línea separadora -->
    <hr class="divider" />

    <!-- Botón "Hablar con un médico" -->
    <a href="teleconsulta.html" class="btn-primary" role="button">
      <svg viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
      </svg>
      Hablar con un médico
    </a>

    <!-- Botón "Nueva consulta" -->
    <a href="index.html" class="btn-secondary" role="button">
      <svg viewBox="0 0 24 24">
        <path d="M3 12h18M3 12l4-4M3 12l4 4" />
      </svg>
      Nueva consulta
    </a>

  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const resultBadge = document.getElementById('resultBadge');
      const resultMessage = document.getElementById('resultMessage');
      const recContainer = document.getElementById('recommendationsContainer');

      // Read symptoms from sessionStorage
      const rawSymptoms = sessionStorage.getItem('selectedSymptoms');
      const symptoms = rawSymptoms ? JSON.parse(rawSymptoms) : [];

      let isGrave = symptoms.length >= 3;
      
      // Update badge style and message
      if (isGrave) {
        resultBadge.textContent = 'Atención Requerida';
        resultBadge.style.background = 'rgba(232, 67, 94, 0.1)';
        resultBadge.style.color = '#e8435e';
        resultBadge.style.borderColor = 'rgba(232, 67, 94, 0.2)';
        resultMessage.textContent = 'Se detectan varios síntomas concurrentes. Te recomendamos consultar con un médico de inmediato.';
      } else {
        resultBadge.textContent = 'Caso Leve';
        resultBadge.style.background = 'rgba(42, 125, 225, 0.08)';
        resultBadge.style.color = '#2a7de1';
        resultBadge.style.borderColor = 'rgba(42, 125, 225, 0.08)';
        resultMessage.textContent = 'Tus síntomas parecen ser leves. Recomendamos reposo y cuidados en casa.';
      }

      // Generate dynamic recommendations list
      let recs = [];
      if (isGrave) {
        recs = [
          'Consultar con un médico profesional (Teleconsulta o Presencial)',
          'Monitorear frecuentemente la temperatura y síntomas',
          'Evitar realizar actividades físicas o esfuerzos intensos'
        ];
      } else {
        // Simple recommendations based on symptoms if any
        recs.push('Descansar y reponer energías');
        recs.push('Hidratarse adecuadamente con abundante agua o suero');
        
        if (symptoms.includes('Fiebre') || symptoms.includes('Dolor de cabeza')) {
          recs.push('Tomar paracetamol si presentas molestias, según dosis recomendadas');
        } else if (symptoms.includes('Dolor de garganta') || symptoms.includes('Tos')) {
          recs.push('Tomar bebidas tibias para suavizar la garganta');
        } else {
          recs.push('Monitorear la evolución en las próximas 24 horas');
        }
      }

      // Render recommendations
      let html = '<p>Te recomendamos:</p>';
      recs.forEach(rec => {
        html += `
          <div class="recomendacion-item">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>
            <span>${rec}</span>
          </div>
        `;
      });
      recContainer.innerHTML = html;
    });
  </script>

</body>
</html>
