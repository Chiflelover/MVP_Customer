<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR.IANKA · Resultado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  
  <!-- CSS Separados -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/diagnostico.css" />
</head>
<body>

  <main class="card" role="main" aria-label="Resultado de la evaluación médica">

    <!-- LOGO con corazón -->
    <div class="logo" aria-label="Logo DR.IANKA">
      <div class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
      </div>
      <span class="logo-text">DR.IANKA</span>
    </div>

    <!-- Título -->
    <h1 class="title">Resultado</h1>

    <!-- Etiqueta de resultado -->
    <div class="result-badge" id="resultBadge">Resultado</div>

    <!-- Mensaje principal -->
    <p class="message" id="resultMessage">No parece una emergencia.</p>

    <!-- Recomendaciones -->
    <div class="recomendaciones" id="recommendationsContainer">
      <p>Te recomendamos</p>
      <!-- Se llenará dinámicamente -->
    </div>

    <!-- Línea separadora -->
    <hr class="divider" />

    <!-- Botón "Hablar con un médico" -->
    <a href="teleconsulta.html" class="btn-primary" role="button">
      <svg viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
      </svg>
      Hablar con un médico
    </a>

    <!-- Botón "Nueva consulta" -->
    <a href="index.html" class="btn-secondary" role="button">
      <svg viewBox="0 0 24 24">
        <path d="M3 12h18M3 12l4-4M3 12l4 4" />
      </svg>
      Nueva consulta
    </a>

  </main>

  <!-- JS Separado -->
  <script src="js/diagnostico.js"></script>

</body>
</html>
