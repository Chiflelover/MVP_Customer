<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR.IANKA · Formulario</title>
  <meta name="description"
    content="Completa tus datos y cuéntale tus síntomas a DR.IANKA para recibir orientación médica personalizada." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
    rel="stylesheet" />

  <!-- CSS Separados -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/formulario.css" />
</head>

<body>

  <!-- ========== CUSTOM ALERT ========== -->
  <div id="customAlert" class="custom-alert-overlay" role="dialog" aria-modal="true" aria-labelledby="customAlertTitle">
    <div class="custom-alert-box">
      <div class="custom-alert-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <h3 class="custom-alert-title" id="customAlertTitle">Atención</h3>
      <p class="custom-alert-message" id="customAlertMessage">Por favor completa todos los campos.</p>
      <button class="custom-alert-btn" id="customAlertBtn">Entendido</button>
    </div>
  </div>

  <main class="card" role="main" aria-label="Formulario y chatbot de orientación médica">

    <!-- ============================================================
         VISTA 1 – DATOS DEL USUARIO
    ============================================================ -->
    <section id="formView" class="view" aria-label="Datos del usuario">

      <!-- LOGO -->
      <div class="logo" aria-label="Logo DR.IANKA">
        <div class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
        </div>
        <span class="logo-text">DR.IANKA</span>
      </div>

      <!-- Step indicator -->
      <div class="step-indicator" aria-hidden="true">
        <div class="step-dot active" id="stepDot1"></div>
        <div class="step-dot" id="stepDot2"></div>
      </div>

      <!-- Header -->
      <div class="form-header">
        <a href="index.html" class="back-link" aria-label="Volver atrás">←</a>
        <h1 class="form-title">Tus datos</h1>
      </div>
      <p class="form-sub">Primero cuéntanos un poco sobre ti</p>

      <!-- Formulario -->
      <form id="userDataForm" autocomplete="off" novalidate>

        <!-- Nombre (opcional, para personalizar el chat) -->
        <div class="form-group">
          <label for="nombre">Tu nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ej. María" />
        </div>

        <!-- Edad -->
        <div class="form-group">
          <label for="edad">Edad</label>
          <input type="number" id="edad" name="edad" placeholder="Ej. 32" min="0" max="120" required />
        </div>

        <!-- Sexo -->
        <div class="form-group">
          <label>Sexo</label>
          <div class="radio-group" role="radiogroup" aria-label="Selecciona tu sexo">
            <label class="radio-pill" id="pill-hombre">
              <input type="radio" name="sexo" value="hombre" />
              <span class="pill-dot"></span>
              Hombre
            </label>
            <label class="radio-pill" id="pill-mujer">
              <input type="radio" name="sexo" value="mujer" />
              <span class="pill-dot"></span>
              Mujer
            </label>
            <label class="radio-pill" id="pill-otro">
              <input type="radio" name="sexo" value="otro" />
              <span class="pill-dot"></span>
              Otro
            </label>
          </div>
        </div>

        <!-- Botón continuar -->
        <button type="submit" class="btn-primary" id="btnContinuar">
          Continuar al chat
          <svg viewBox="0 0 24 24">
            <path d="M5 12h14M13 6l6 6-6 6" />
          </svg>
        </button>

      </form>
    </section>

    <!-- ============================================================
         VISTA 2 – CHAT CON DR.IANKA
    ============================================================ -->
    <section id="chatView" class="view hidden" aria-label="Chat con DR.IANKA">

      <!-- Header del chat -->
      <div class="chat-header">
        <button class="chat-header-back" id="btnVolverForm" aria-label="Volver al formulario">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M11 6l-6 6 6 6" />
          </svg>
        </button>
        <div class="chat-avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
          </svg>
        </div>
        <div class="chat-header-info">
          <div class="chat-header-name">DR.IANKA</div>
          <div class="chat-header-status">
            <span class="status-dot"></span>
            Asistente médico virtual
          </div>
        </div>
      </div>

      <!-- Mensajes -->
      <div class="chat-messages" id="chatMessages" aria-live="polite" aria-label="Historial del chat"></div>

      <!-- Input área -->
      <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="Escribe tus síntomas aquí..."
          aria-label="Escribe tu mensaje" autocomplete="off" />
        <button class="chat-send-btn" id="chatSendBtn" aria-label="Enviar mensaje">
          <svg viewBox="0 0 24 24">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" />
          </svg>
        </button>
      </div>

    </section>

  </main>

  <!-- JS Separado -->
  <script src="js/formulario.js"></script>

</body>

</html>
